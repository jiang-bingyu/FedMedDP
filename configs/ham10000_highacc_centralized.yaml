seed: 2026

dataset:
  root: data/ham10000_binary
  image_size: 300
  batch_size: 48
  num_workers: 4
  num_clients: 1
  dirichlet_alpha: 1.0
  val_ratio: 0.1
  test_ratio: 0.1
  min_samples_per_client: 20
  weighted_sampling: true
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  augmentation_strength: strong
  train_crop_scale: 0.72
  random_erasing: 0.12

model:
  backbone: efficientnet_b3
  num_classes: 2
  dropout: 0.3
  pretrained: true

federated:
  rounds: 80
  client_fraction: 1.0
  local_epochs: 1
  optimizer: adamw
  lr: 0.00008
  weight_decay: 0.0001
  use_class_weights: true
  label_smoothing: 0.02
  loss: focal
  focal_gamma: 1.5

evaluation:
  tune_threshold: true
  threshold_metric: accuracy
  threshold_min: 0.05
  threshold_max: 0.95
  threshold_steps: 91
  tta: true

privacy:
  enabled: false
  mechanism: none
  clip_norm: 1.0
  noise_multiplier: 0.0
  laplace_scale: 0.0
  noise_scale_mode: vector
  hybrid_alpha: 0.7
  delta: 0.00001

output:
  dir: outputs
  experiment_name: ham10000_highacc_centralized

runtime:
  device: auto
  amp: true
  channels_last: true
  cudnn_benchmark: true
