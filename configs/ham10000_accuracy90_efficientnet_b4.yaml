seed: 2026

dataset:
  root: data/ham10000_binary
  image_size: 380
  batch_size: 16
  num_workers: 4
  num_clients: 1
  dirichlet_alpha: 1.0
  val_ratio: 0.1
  test_ratio: 0.1
  min_samples_per_client: 20
  weighted_sampling: true
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  augmentation_strength: accuracy90
  train_crop_scale: 0.84
  random_erasing: 0.04

model:
  backbone: efficientnet_b4
  num_classes: 2
  dropout: 0.18
  pretrained: true

federated:
  rounds: 90
  client_fraction: 1.0
  local_epochs: 1
  optimizer: adamw
  lr: 0.00003
  weight_decay: 0.00004
  use_class_weights: true
  label_smoothing: 0.005
  loss: focal
  focal_gamma: 1.0
  lr_scheduler: cosine
  min_lr: 0.000001
  early_stopping: true
  early_stopping_metric: val_accuracy
  early_stopping_patience: 15
  early_stopping_min_delta: 0.001

evaluation:
  tune_threshold: true
  threshold_metric: accuracy
  threshold_min: 0.05
  threshold_max: 0.95
  threshold_steps: 181
  tta: true

privacy:
  enabled: false
  mechanism: none
  clip_norm: 1.0
  noise_multiplier: 0.0
  laplace_scale: 0.0
  noise_scale_mode: vector
  hybrid_alpha: 0.7
  delta: 0.00001

output:
  dir: outputs
  experiment_name: ham10000_accuracy90_efficientnet_b4

runtime:
  device: auto
  amp: true
  channels_last: true
  cudnn_benchmark: true
