seed: 2028
dataset:
  root: data/ham10000_binary
  image_size: 384
  batch_size: 24
  num_workers: 4
  num_clients: 1
  dirichlet_alpha: 1.0
  val_ratio: 0.1
  test_ratio: 0.1
  min_samples_per_client: 20
  weighted_sampling: true
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  augmentation_strength: strong
  train_crop_scale: 0.82
  random_erasing: 0.04
model:
  backbone: convnext_small
  num_classes: 2
  dropout: 0.12
  pretrained: true
federated:
  rounds: 60
  client_fraction: 1.0
  local_epochs: 1
  optimizer: adamw
  lr: 2.0e-05
  weight_decay: 3.0e-05
  use_class_weights: true
  label_smoothing: 0.005
  loss: focal
  focal_gamma: 1.0
  lr_scheduler: cosine
  min_lr: 1.0e-06
evaluation:
  tune_threshold: true
  threshold_metric: accuracy
  threshold_min: 0.05
  threshold_max: 0.95
  threshold_steps: 181
  tta: true
privacy:
  enabled: false
  mechanism: none
  clip_norm: 1.0
  noise_multiplier: 0.0
  laplace_scale: 0.0
  noise_scale_mode: vector
  hybrid_alpha: 0.7
  delta: 1.0e-05
output:
  dir: outputs
  experiment_name: ham10000_literature_target_seed2028
runtime:
  device: auto
  amp: true
  channels_last: true
  cudnn_benchmark: true
